name: Build TWRP from Source (with Custom Kernel)

on:
  workflow_dispatch:
    inputs:
      gdrive_file_id:
        description: 'Google Drive File ID for Image.gz (e.g. 1AbCdEfG...)'
        required: true
        default: ''
      device_tree_url:
        description: 'Your TWRP Device Tree GitHub Link'
        required: true
        default: 'https://github.com/USERNAME/device_xiaomi_light-twrp'
      device_tree_branch:
        description: 'Device Tree Branch'
        required: true
        default: 'twrp-12.1'
      twrp_branch:
        description: 'TWRP Manifest Branch (e.g. twrp-12.1 or twrp-11)'
        required: true
        default: 'twrp-12.1'
      device_code:
        description: 'Device Code (e.g. light)'
        required: true
        default: 'light'

jobs:
  build:
    name: Build TWRP Recovery
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
    # ── 1. Free up disk space for TWRP build ────────────────────────────────
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 8192
        swap-size-mb: 8192
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'

    # ── 2. Install Dependencies & Tools ──────────────────────────────────────
    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3-pip
        sudo pip3 install gdown

    # ── 3. Install repo tool ─────────────────────────────────────────────────
    - name: Install repo
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    # ── 4. Sync TWRP Minimal Manifest ────────────────────────────────────────
    - name: Sync TWRP Source
      run: |
        mkdir twrp
        cd twrp
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b ${{ github.event.inputs.twrp_branch }}
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    # ── 5. Clone Device Tree ─────────────────────────────────────────────────
    - name: Clone Device Tree
      working-directory: twrp
      run: |
        git clone -b ${{ github.event.inputs.device_tree_branch }} ${{ github.event.inputs.device_tree_url }} device/xiaomi/${{ github.event.inputs.device_code }}

    # ── 6. Download Kernel & Replace in Device Tree ──────────────────────────
    - name: Inject Custom Kernel (Image.gz)
      working-directory: twrp
      run: |
        echo "Downloading custom Image.gz from Google Drive..."
        gdown "https://drive.google.com/uc?id=${{ github.event.inputs.gdrive_file_id }}" -O Image.gz
        
        echo "Searching for prebuilt kernel directory in Device Tree..."
        # Find where the kernel is located in the device tree and replace it
        KERNEL_PATH=$(find device/xiaomi/${{ github.event.inputs.device_code }} -name "kernel" -o -name "Image.gz" | head -n 1)
        
        if [ -z "$KERNEL_PATH" ]; then
          echo "WARNING: Could not auto-detect kernel path. Assuming 'prebuilt/kernel'..."
          KERNEL_PATH="device/xiaomi/${{ github.event.inputs.device_code }}/prebuilt/kernel"
          mkdir -p $(dirname $KERNEL_PATH)
        fi
        
        echo "Replacing kernel at: $KERNEL_PATH"
        cp Image.gz $KERNEL_PATH

    # ── 7. Build TWRP ────────────────────────────────────────────────────────
    - name: Build TWRP
      working-directory: twrp
      run: |
        source build/envsetup.sh
        lunch twrp_${{ github.event.inputs.device_code }}-eng
        mka recoveryimage -j$(nproc --all)

    # ── 8. Upload Artifact ───────────────────────────────────────────────────
    - name: Upload TWRP Image
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Custom-Kernel-${{ github.event.inputs.device_code }}
        path: twrp/out/target/product/${{ github.event.inputs.device_code }}/recovery.img
        retention-days: 5
