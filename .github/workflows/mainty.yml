name: Inject Touch Drivers into Prebuilt TWRP

on:
  workflow_dispatch:
    inputs:
      twrp_url:
        description: 'Direct URL to your Bootable TWRP.img'
        required: true
        default: 'https://github.com/testuru56-del/twrp-light-builder/releases/download/twrp/twrp.img'

jobs:
  inject_drivers:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    
    steps:
    # ── 1. Fetch Repository Files (Gets your modules.zip) ──────────────
    - name: Checkout Code
      uses: actions/checkout@v4

    # ── 2. Install Dependencies ─────────────────────────────────────────────
    - name: Install dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update -yqq
        sudo apt-get install -yqq curl unzip cpio wget

    # ── 3. Download Magiskboot (API BYPASS FIXED) ───────────────────────────
    - name: Download Magiskboot
      run: |
        echo "Downloading Magiskboot v27.0 directly..."
        wget -qO magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk"
        unzip -j magisk.apk "lib/x86_64/libmagiskboot.so" -d .
        mv libmagiskboot.so magiskboot
        chmod +x magiskboot

    # ── 4. Download TWRP ────────────────────────────────────────────────────
    - name: Download TWRP image
      run: |
        echo "Downloading TWRP image..."
        wget -O twrp.img "${{ github.event.inputs.twrp_url }}"

    # ── 5. Unpack TWRP & Extract Ramdisk ────────────────────────────────────
    - name: Unpack TWRP & Extract Ramdisk
      run: |
        mkdir work && cd work
        ../magiskboot unpack ../twrp.img
        
        echo "Extracting Ramdisk..."
        mkdir ramdisk_extract && cd ramdisk_extract
        ../magiskboot decompress ../ramdisk.cpio ramdisk.cpio.tmp
        cpio -i < ramdisk.cpio.tmp || true
        rm ramdisk.cpio.tmp

    # ── 6. Inject Touch Drivers (.ko files) ─────────────────────────────────
    - name: Inject Touch Drivers (.ko files)
      run: |
        cd work/ramdisk_extract
        
        echo "Creating lib/modules directory..."
        mkdir -p lib/modules
        
        echo "Extracting .ko files into Ramdisk..."
        # Extracting the modules.zip directly from your GitHub repo!
        unzip -j ../../modules.zip -d lib/modules/
        
        echo "Creating auto-load script for Touch..."
        echo '#!/system/bin/sh' > load_touch.sh
        echo 'for m in /lib/modules/*.ko; do insmod $m; done' >> load_touch.sh
        chmod +x load_touch.sh
        
        echo "Triggering script on TWRP boot in init.rc..."
        cat << 'EOF' >> init.rc

        service load_touch /system/bin/sh /load_touch.sh
            user root
            group root
            disabled
            oneshot
            seclabel u:r:recovery:s0

        on boot
            start load_touch
        EOF

    # ── 7. Repack Ramdisk & TWRP Image ──────────────────────────────────────
    - name: Repack Ramdisk & Final TWRP Image
      run: |
        echo "Repacking Ramdisk..."
        cd work/ramdisk_extract
        find . | cpio -o -H newc > ../ramdisk.cpio.uncompressed
        cd ..
        
        echo "Compressing Ramdisk..."
        ../magiskboot compress=gzip ramdisk.cpio.uncompressed ramdisk.cpio
        
        echo "Repacking Final TWRP Image..."
        ../magiskboot repack ../twrp.img ../twrp_touch_fixed_final.img

    # ── 8. Upload Final Artifact ─────────────────────────────────────────────
    - name: Upload Final TWRP
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Ramdisk-Injected-Light
        path: twrp_touch_fixed_final.img
        retention-days: 5
