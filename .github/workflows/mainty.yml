name: Swap Kernel in Prebuilt TWRP

on:
  workflow_dispatch:
    inputs:
      twrp_url:
        description: 'Direct URL to Bootable TWRP (No Touch)'
        required: true
        default: 'https://github.com/testuru56-del/twrp-light-builder/releases/download/twrp/twrp.img'
      stock_boot_url:
        description: 'Direct URL to Stock boot.img or recovery.img'
        required: true
        default: 'LINK_YAHA_DAALEIN'

jobs:
  swap_kernel:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    
    steps:
    # ── 1. Install Dependencies ─────────────────────────────────────────────
    - name: Install dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update -yqq
        sudo apt-get install -yqq curl unzip wget

    # ── 2. Download Magiskboot (Global Install) ─────────────────────────────
    - name: Download Magiskboot
      run: |
        echo "Downloading Magiskboot v27.0 directly..."
        wget -qO magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk"
        unzip -j magisk.apk "lib/x86_64/libmagiskboot.so" -d .
        mv libmagiskboot.so magiskboot
        chmod +x magiskboot
        sudo mv magiskboot /usr/local/bin/

    # ── 3. Download TWRP and Stock Boot ─────────────────────────────────────
    - name: Download Images
      run: |
        echo "Downloading TWRP image..."
        wget -qO twrp.img "${{ github.event.inputs.twrp_url }}"
        
        echo "Downloading Stock Boot/Recovery image..."
        wget -qO stock_boot.img "${{ github.event.inputs.stock_boot_url }}"

    # ── 4. Unpack Images & Swap Kernel ──────────────────────────────────────
    - name: Unpack & Swap
      run: |
        echo "Unpacking Stock Image..."
        mkdir stock_extract && cd stock_extract
        magiskboot unpack ../stock_boot.img
        cd ..
        
        echo "Unpacking TWRP Image..."
        mkdir twrp_extract && cd twrp_extract
        magiskboot unpack ../twrp.img
        
        echo "Swapping Kernel and Device Tree (DTB)..."
        # Copying the real working kernel and DTB from Stock to TWRP
        cp -f ../stock_extract/kernel . || echo "Warning: No kernel found in stock"
        cp -f ../stock_extract/dtb . || echo "Warning: No dtb found in stock"
        cp -f ../stock_extract/dtbo.img . || echo "Warning: No dtbo found in stock"
        
        echo "Repacking Final TWRP with Stock Kernel..."
        magiskboot repack ../twrp.img ../twrp_kernel_swapped.img

    # ── 5. Upload Final Artifact ────────────────────────────────────────────
    - name: Upload Final TWRP
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Kernel-Swapped
        path: twrp_kernel_swapped.img
        retention-days: 5
