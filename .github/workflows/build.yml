name: TWRP Touch Fix - Poco M4 5G

on:
  workflow_dispatch:
    inputs:
      twrp_url:
        description: "Direct TWRP image URL"
        required: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
          git bc bison flex zip unzip cpio curl wget \
          clang-14 lld-14 llvm-14 \
          gcc-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi \
          libssl-dev libelf-dev

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 \
          -b light-u-oss \
          https://github.com/MiCode/Xiaomi_Kernel_OpenSource kernel

      - name: Set Defconfig
        run: |
          echo "DEFCONFIG=k6833v1_64_k419_defconfig" >> $GITHUB_ENV

      - name: Patch Touch Drivers
        working-directory: kernel
        run: |
          CFG=arch/arm64/configs/$DEFCONFIG

          sed -i '/CONFIG_TOUCHSCREEN_FOCALTECH/d' $CFG || true
          sed -i '/CONFIG_TOUCHSCREEN_FTS/d' $CFG || true

          echo "CONFIG_TOUCHSCREEN_NT36XXX=y" >> $CFG
          echo "CONFIG_TOUCHSCREEN_NT36523=y" >> $CFG

      - name: Build Kernel
        working-directory: kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64

          export CC=clang-14
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          make O=out ARCH=arm64 $DEFCONFIG

          make O=out ARCH=arm64 \
            CC=clang-14 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            -j$(nproc)

          echo "=== BOOT OUTPUT ==="
          find out/arch/arm64/boot -type f

      - name: Download MagiskBoot
        run: |
          wget -O Magisk.apk \
          https://github.com/topjohnwu/Magisk/releases/latest/download/Magisk-v29.0.apk

          unzip -p Magisk.apk lib/x86_64/libmagiskboot.so > magiskboot
          chmod +x magiskboot

      - name: Download TWRP
        run: |
          curl -L "${{ github.event.inputs.twrp_url }}" -o twrp.img

      - name: Repack TWRP
        run: |
          mkdir work
          cd work

          ../magiskboot unpack ../twrp.img

          cd ..

          KERNEL=""

          for f in \
            kernel/out/arch/arm64/boot/Image.gz-dtb \
            kernel/out/arch/arm64/boot/Image-dtb \
            kernel/out/arch/arm64/boot/Image.gz \
            kernel/out/arch/arm64/boot/Image
          do
            if [ -f "$f" ]; then
              KERNEL=$f
              break
            fi
          done

          if [ -z "$KERNEL" ]; then
            echo "Kernel image not found"
            exit 1
          fi

          cp "$KERNEL" work/kernel

          cd work
          ../magiskboot repack ../twrp.img

          mv new-boot.img ../twrp_touch_fixed.img

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: twrp-touch-fixed
          path: twrp_touch_fixed.img
